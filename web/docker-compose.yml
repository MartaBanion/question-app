services:
  db:
    image: postgres:16-alpine
    container_name: question-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: question_app
      POSTGRES_USER: question_app
      POSTGRES_PASSWORD: question_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U question_app -d question_app"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: question-app-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: question-app-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
